<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0e14" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gold Accent Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Cyan/Blue Accent Gradient -->
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00a8e8" />
      <stop offset="100%" stop-color="#004e92" />
    </linearGradient>

    <!-- Laser Line Gradient -->
    <linearGradient id="laser-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#00a8e8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00a8e8" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bg-grad)" />
  
  <!-- Subtle Grid Pattern in background -->
  <g opacity="0.05">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450" stroke="#ffffff" stroke-width="1"/>
    <path d="M 100,0 L 100,500 M 200,0 L 200,500 M 300,0 L 300,500 M 400,0 L 400,500 M 500,0 L 500,500 M 600,0 L 600,500 M 700,0 L 700,500" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Title / Concept Representation -->
  <text x="400" y="50" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="1">ERP DATA MIGRATION ENGINE</text>

  <!-- LEFT: Oracle NetSuite Cloud Server -->
  <g transform="translate(150, 250)">
    <!-- Base Glow -->
    <ellipse cx="0" cy="80" rx="90" ry="20" fill="#f59e0b" opacity="0.15" filter="url(#glow-gold)" />
    
    <!-- NetSuite Cloud Server Block -->
    <rect x="-80" y="-80" width="160" height="150" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2" opacity="0.9" />
    
    <!-- Server Rows -->
    <rect x="-65" y="-60" width="130" height="25" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <circle cx="-50" cy="-47.5" r="4" fill="#f59e0b" filter="url(#glow-gold)" />
    <line x1="-35" y1="-47.5" x2="50" y2="-47.5" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.8" />
    
    <rect x="-65" y="-25" width="130" height="25" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <circle cx="-50" cy="-12.5" r="4" fill="#f59e0b" />
    <line x1="-35" y1="-12.5" x2="30" y2="-12.5" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" opacity="0.5" />

    <rect x="-65" y="10" width="130" height="25" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <circle cx="-50" cy="22.5" r="4" fill="#10b981" />
    <line x1="-35" y1="22.5" x2="45" y2="22.5" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" opacity="0.5" />

    <!-- Label -->
    <text x="0" y="100" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#f8fafc" text-anchor="middle">ORACLE NETSUITE</text>
    <text x="0" y="118" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#f59e0b" text-anchor="middle" letter-spacing="0.5">LEGACY ERP SOURCE</text>
  </g>

  <!-- RIGHT: Microsoft Dynamics 365 Business Central Server -->
  <g transform="translate(650, 250)">
    <!-- Base Glow -->
    <ellipse cx="0" cy="80" rx="90" ry="20" fill="#00a8e8" opacity="0.2" filter="url(#glow-cyan)" />
    
    <!-- Business Central Server Block -->
    <rect x="-80" y="-80" width="160" height="150" rx="12" fill="#1e293b" stroke="#00a8e8" stroke-width="2" opacity="0.9" />
    
    <!-- Server Rows -->
    <rect x="-65" y="-60" width="130" height="25" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <circle cx="-50" cy="-47.5" r="4" fill="#00a8e8" filter="url(#glow-cyan)" />
    <line x1="-35" y1="-47.5" x2="40" y2="-47.5" stroke="#00a8e8" stroke-width="3" stroke-linecap="round" opacity="0.8" />
    
    <rect x="-65" y="-25" width="130" height="25" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <circle cx="-50" cy="-12.5" r="4" fill="#00a8e8" filter="url(#glow-cyan)" />
    <line x1="-35" y1="-12.5" x2="55" y2="-12.5" stroke="#00a8e8" stroke-width="3" stroke-linecap="round" opacity="0.8" />

    <rect x="-65" y="10" width="130" height="25" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <circle cx="-50" cy="22.5" r="4" fill="#10b981" />
    <line x1="-35" y1="22.5" x2="35" y2="22.5" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" opacity="0.5" />

    <!-- Label -->
    <text x="0" y="100" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#f8fafc" text-anchor="middle">DYNAMICS 365 BC</text>
    <text x="0" y="118" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#00a8e8" text-anchor="middle" letter-spacing="0.5">TARGET ERP SYSTEM</text>
  </g>

  <!-- CENTER: Migration Data Stream & Pipes -->
  <g>
    <!-- Connecting Laser Pipeline (Curve) -->
    <path d="M 230,250 C 350,150 450,150 570,250" fill="none" stroke="url(#laser-grad)" stroke-width="6" filter="url(#glow-cyan)" />
    <path d="M 230,250 C 350,150 450,150 570,250" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="10 15" opacity="0.8" />

    <!-- Data Processing Central Hub -->
    <g transform="translate(400, 190)">
      <!-- Hub circle -->
      <circle cx="0" cy="0" r="45" fill="#1e293b" stroke="#00a8e8" stroke-width="2" filter="url(#glow-cyan)" />
      
      <!-- Inner details: gear -->
      <path d="M-6,-15 L6,-15 L8,-8 L15,-8 L15,0 L8,8 L6,15 L-6,15 L-8,8 L-15,8 L-15,-8 L-8,-8 Z" fill="none" stroke="#91d8ff" stroke-width="2" transform="rotate(25)" />
      <circle cx="0" cy="0" r="5" fill="#00a8e8" />

      <!-- Hub Label -->
      <rect x="-55" y="55" width="110" height="22" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1" />
      <text x="0" y="70" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#91d8ff" text-anchor="middle" letter-spacing="0.5">AL TRANSFORMATION</text>
    </g>

    <!-- Moving Data Blocks (Representing Records) -->
    <!-- Block 1: Chart of Accounts -->
    <g transform="translate(290, 205)" opacity="0.85">
      <rect x="-35" y="-12" width="70" height="24" rx="4" fill="#334155" stroke="#f59e0b" stroke-width="1.5" />
      <text x="0" y="4" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#f8fafc" text-anchor="middle">ACCOUNTS</text>
    </g>

    <!-- Block 2: Customer Records -->
    <g transform="translate(510, 205)" opacity="0.85">
      <rect x="-38" y="-12" width="76" height="24" rx="4" fill="#334155" stroke="#00a8e8" stroke-width="1.5" />
      <text x="0" y="4" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#f8fafc" text-anchor="middle">CUSTOMERS</text>
    </g>

    <!-- Block 3: Inventory Items (Near Hub) -->
    <g transform="translate(400, 115)" opacity="0.95">
      <rect x="-32" y="-12" width="64" height="24" rx="4" fill="#1e293b" stroke="#00a8e8" stroke-width="1.5" filter="url(#glow-cyan)" />
      <text x="0" y="4" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#f8fafc" text-anchor="middle">ITEMS</text>
    </g>
  </g>
</svg>
