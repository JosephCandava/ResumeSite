<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0e14" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-viva" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-fb" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Facebook Blue Gradient -->
    <linearGradient id="fb-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1877f2" />
      <stop offset="100%" stop-color="#0d4fb5" />
    </linearGradient>

    <!-- Microsoft Viva Violet Gradient -->
    <linearGradient id="viva-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ca8a04" stop-opacity="0"/>
      <stop offset="20%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Transference Beam -->
    <linearGradient id="beam-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1877f2" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bg-grad)" />

  <!-- Title -->
  <text x="400" y="50" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="1">COMMUNITY &amp; IDENTITY MIGRATION</text>

  <!-- Left: Meta Workplace Hub -->
  <g transform="translate(160, 250)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="75" fill="#1877f2" opacity="0.1" filter="url(#glow-fb)"/>
    
    <!-- Central Workplace Bubble -->
    <circle cx="0" cy="0" r="45" fill="url(#fb-grad)" stroke="#ffffff" stroke-width="1.5" filter="url(#glow-fb)" />
    
    <!-- "W" Social Symbol representation -->
    <path d="M-18,-12 L-8,12 L-1,12 L5,-2 L11,12 L18,12 L28,-12 L20,-12 L14,4 L9,-12 L1,-12 L-4,4 L-10,-12 Z" fill="#ffffff" />
    
    <!-- Linked Satellite Profile Nodes -->
    <g opacity="0.7">
      <line x1="0" y1="0" x2="-80" y2="-40" stroke="#1877f2" stroke-width="2"/>
      <line x1="0" y1="0" x2="-60" y2="70" stroke="#1877f2" stroke-width="2"/>
      <line x1="0" y1="0" x2="30" y2="-80" stroke="#1877f2" stroke-width="2"/>
      
      <!-- Profile bubble 1 -->
      <circle cx="-80" cy="-40" r="16" fill="#1e293b" stroke="#1877f2" stroke-width="2"/>
      <circle cx="-80" cy="-44" r="6" fill="#94a3b8"/>
      <path d="M-90,-30 C-90,-36 -70,-36 -70,-30 Z" fill="#94a3b8"/>

      <!-- Profile bubble 2 -->
      <circle cx="-60" cy="70" r="14" fill="#1e293b" stroke="#1877f2" stroke-width="2"/>
      <circle cx="-60" cy="67" r="5" fill="#94a3b8"/>
      <path d="M-68,78 C-68,73 -52,73 -52,78 Z" fill="#94a3b8"/>

      <!-- Profile bubble 3 -->
      <circle cx="30" cy="-80" r="15" fill="#1e293b" stroke="#1877f2" stroke-width="2"/>
      <circle cx="30" cy="-84" r="5.5" fill="#94a3b8"/>
      <path d="M21,-71 C21,-77 39,-77 39,-71 Z" fill="#94a3b8"/>
    </g>

    <text x="0" y="105" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#f8fafc" text-anchor="middle">META WORKPLACE</text>
    <text x="0" y="123" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#1877f2" text-anchor="middle" letter-spacing="0.5">SOURCE PLATFORM</text>
  </g>

  <!-- Right: Microsoft Viva Engage Hub -->
  <g transform="translate(640, 250)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="80" fill="#a855f7" opacity="0.15" filter="url(#glow-viva)"/>
    
    <!-- Central Viva Engage Emblem Structure -->
    <!-- Stylized overlapping community loop shapes representing Viva logo -->
    <path d="M-35,-25 C-15,-45 15,-45 35,-25 C55,-5 55,25 35,45 C15,65 -15,65 -35,45 C-55,25 -55,-5 -35,-25 Z" fill="none" stroke="url(#viva-grad)" stroke-width="12" filter="url(#glow-viva)"/>
    <circle cx="0" cy="0" r="28" fill="#1e293b" stroke="#ffffff" stroke-width="1"/>
    
    <!-- Microsoft Logo in center -->
    <g transform="translate(-10, -10)">
      <rect x="0" y="0" width="9" height="9" fill="#f25022"/>
      <rect x="11" y="0" width="9" height="9" fill="#7fba00"/>
      <rect x="0" y="11" width="9" height="9" fill="#00a1f1"/>
      <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
    </g>
    
    <!-- Linked target nodes -->
    <g opacity="0.8">
      <line x1="0" y1="0" x2="70" y2="-50" stroke="#a855f7" stroke-width="2"/>
      <line x1="0" y1="0" x2="60" y2="60" stroke="#6366f1" stroke-width="2"/>
      <line x1="0" y1="0" x2="-20" y2="-80" stroke="#a855f7" stroke-width="2"/>

      <!-- Group node 1 -->
      <circle cx="70" cy="-50" r="15" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
      <path d="M60,-50 L80,-50 M70,-60 L70,-40" stroke="#a855f7" stroke-width="2"/>

      <!-- Community node 2 -->
      <circle cx="60" cy="60" r="16" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
      <circle cx="56" cy="56" r="4" fill="#6366f1"/>
      <circle cx="64" cy="56" r="4" fill="#6366f1"/>
      <circle cx="60" cy="65" r="4" fill="#6366f1"/>

      <!-- Target Node 3 (Entra user sync check) -->
      <circle cx="-20" cy="-80" r="14" fill="#1e293b" stroke="#00a8e8" stroke-width="2" filter="url(#glow-fb)"/>
      <path d="M-25,-82 L-22,-85 L-15,-78" fill="none" stroke="#00a8e8" stroke-width="2"/>
    </g>

    <text x="0" y="105" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#f8fafc" text-anchor="middle">VIVA ENGAGE</text>
    <text x="0" y="123" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#a855f7" text-anchor="middle" letter-spacing="0.5">TARGET COMMUNITY</text>
  </g>

  <!-- Transfer Flow -->
  <g>
    <path d="M 230,250 C 350,160 450,160 570,250" fill="none" stroke="url(#beam-grad)" stroke-width="6" filter="url(#glow-viva)"/>
    <path d="M 230,250 C 350,160 450,160 570,250" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8 12" />

    <!-- Transfer objects -->
    <!-- Message Post Bubble -->
    <g transform="translate(320, 205)">
      <rect x="-25" y="-12" width="50" height="24" rx="6" fill="#1e293b" stroke="#1877f2" stroke-width="1.5"/>
      <!-- Small post text lines -->
      <line x1="-15" y1="-4" x2="15" y2="-4" stroke="#94a3b8" stroke-width="2" />
      <line x1="-15" y1="2" x2="5" y2="2" stroke="#94a3b8" stroke-width="2" />
    </g>

    <!-- User Identity node in center of transfer -->
    <g transform="translate(400, 192)">
      <circle cx="0" cy="0" r="22" fill="#1e293b" stroke="#a855f7" stroke-width="2" filter="url(#glow-viva)"/>
      <!-- Profile shape -->
      <circle cx="0" cy="-4" r="5" fill="#a855f7"/>
      <path d="M-8,6 C-8,1 -3,1 0,1 C3,1 8,1 8,6 Z" fill="#a855f7"/>
      
      <rect x="-35" y="30" width="70" height="18" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1"/>
      <text x="0" y="42" font-family="'Inter', sans-serif" font-size="8" font-weight="700" fill="#00a8e8" text-anchor="middle">ENTRA ID SYNC</text>
    </g>

    <!-- File Migration node -->
    <g transform="translate(480, 205)">
      <rect x="-20" y="-14" width="40" height="28" rx="4" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
      <line x1="-10" y1="-6" x2="10" y2="-6" stroke="#6366f1" stroke-width="2"/>
      <line x1="-10" y1="0" x2="6" y2="0" stroke="#6366f1" stroke-width="2"/>
      <line x1="-10" y1="6" x2="2" y2="6" stroke="#6366f1" stroke-width="2"/>
    </g>
  </g>
</svg>
